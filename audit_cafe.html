<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vella Cafe IT Audit Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#0b1220;
color:white;
font-family:Segoe UI;
margin:0;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.logo{
height:50px;
background:white;
padding:5px;
border-radius:6px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.questions{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.q{
background:#1f2937;
padding:12px;
border-radius:8px;
}

select{
background:#0b1220;
color:white;
padding:6px;
margin-top:5px;
width:100%;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
margin-top:15px;
cursor:pointer;
}

.scoreRow{
display:flex;
gap:30px;
align-items:center;
}

.circle{
width:150px;
height:150px;
border-radius:50%;
border:10px solid #22c55e;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.stats{
display:flex;
gap:15px;
margin-top:15px;
}

.stat{
background:#1f2937;
padding:15px;
border-radius:8px;
text-align:center;
flex:1;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="vella-cafe.png" class="logo">
<h2>Vella Cafe – IT Audit Dashboard</h2>
</div>

<div class="card">
<h3>Cafe Audit Questionnaire</h3>
<div class="questions" id="questions"></div>
<button onclick="generate()">Generate Dashboard</button>
</div>

<div class="card">

<div class="scoreRow">

<div class="circle" id="score">0</div>

<div>
<h2 id="riskText">Risk Level</h2>
<p>Operational risk based on cafe audit responses</p>

<div class="stats">

<div class="stat">
<h3 id="critical">0</h3>
<p>Critical</p>
</div>

<div class="stat">
<h3 id="high">0</h3>
<p>High</p>
</div>

<div class="stat">
<h3 id="medium">0</h3>
<p>Partial</p>
</div>

<div class="stat">
<h3 id="pass">0</h3>
<p>Passed</p>
</div>

</div>

</div>

</div>

</div>

<div class="grid">

<div class="card">
<h3>Answer Distribution</h3>
<canvas id="donut"></canvas>
</div>

<div class="card">
<h3>Domain Radar</h3>
<canvas id="radar"></canvas>
</div>

<div class="card">
<h3>Findings by Severity</h3>
<canvas id="severity"></canvas>
</div>

<div class="card">
<h3>Findings by Domain</h3>
<canvas id="domain"></canvas>
</div>

</div>

</div>

<script>

const questions=[
{q:"POS system protected with unique login",domain:"POS & Billing"},
{q:"Billing reports reviewed daily",domain:"POS & Billing"},

{q:"Orders digitally tracked (POS/KOT)",domain:"Kitchen Operations"},
{q:"Kitchen display/ticket system used",domain:"Kitchen Operations"},

{q:"UPI/Card payments logged automatically",domain:"Payment Controls"},
{q:"Cash reconciliation end of day",domain:"Payment Controls"},

{q:"Ingredient stock tracked daily",domain:"Inventory Control"},
{q:"Expiry dates monitored",domain:"Inventory Control"},

{q:"Customer WiFi separated from POS",domain:"Customer Data"},
{q:"Customer data stored securely",domain:"Customer Data"},

{q:"CCTV covering billing & kitchen",domain:"Physical Security"},
{q:"System access restricted to staff",domain:"Physical Security"}
]

const domains=[
"POS & Billing",
"Kitchen Operations",
"Payment Controls",
"Inventory Control",
"Customer Data",
"Physical Security"
]

const box=document.getElementById("questions")

questions.forEach((q,i)=>{
box.innerHTML+=`
<div class="q">
${i+1}. ${q.q}
<select id="q${i}">
<option value="yes">Yes</option>
<option value="partial">Partial</option>
<option value="no">No</option>
</select>
</div>
`
})

let donut,radar,severityChart,domainChart

function generate(){

let pass=0,partial=0,fail=0

let domainScore={}
domains.forEach(d=>domainScore[d]=0)

questions.forEach((q,i)=>{

let v=document.getElementById("q"+i).value

if(v=="yes"){
pass++
domainScore[q.domain]+=2
}

if(v=="partial"){
partial++
domainScore[q.domain]+=1
}

if(v=="no"){
fail++
}

})

let total=questions.length
let score=Math.round((pass*2+partial)/(total*2)*100)

document.getElementById("score").innerText=score

if(score>=75) document.getElementById("riskText").innerText="Low Risk"
else if(score>=50) document.getElementById("riskText").innerText="Medium Risk"
else document.getElementById("riskText").innerText="High Risk"

document.getElementById("pass").innerText=pass
document.getElementById("medium").innerText=partial
document.getElementById("high").innerText=fail
document.getElementById("critical").innerText=0

/* donut */

if(donut) donut.destroy()

donut=new Chart(document.getElementById("donut"),{
type:"doughnut",
data:{
labels:["Yes","Partial","No"],
datasets:[{
data:[pass,partial,fail],
backgroundColor:["#22c55e","#f59e0b","#ef4444"]
}]
}
})

/* radar */

if(radar) radar.destroy()

radar=new Chart(document.getElementById("radar"),{
type:"radar",
data:{
labels:domains,
datasets:[{
data:Object.values(domainScore),
backgroundColor:"rgba(34,197,94,0.2)",
borderColor:"#22c55e"
}]
}
})

/* severity */

if(severityChart) severityChart.destroy()

severityChart=new Chart(document.getElementById("severity"),{
type:"bar",
data:{
labels:["Critical","High","Medium","Low"],
datasets:[{
data:[0,fail,partial,pass],
backgroundColor:["#ef4444","#f59e0b","#22c55e","#3b82f6"]
}]
}
})

/* domain */

if(domainChart) domainChart.destroy()

domainChart=new Chart(document.getElementById("domain"),{
type:"bar",
data:{
labels:domains,
datasets:[{
data:Object.values(domainScore),
backgroundColor:"#60a5fa"
}]
}
})

}

</script>

</body>
</html>
